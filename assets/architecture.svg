<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<title>Game Glitch Investigator — System Architecture</title>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- USER -->
<rect x="270" y="20" width="140" height="44" rx="8" fill="#E8E7E0" stroke="#888" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">User</text>

<!-- Arrow down -->
<line x1="340" y1="64" x2="340" y2="98" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="350" y="86" dominant-baseline="central" fill="#888">guess input</text>

<!-- APP.PY -->
<rect x="195" y="98" width="290" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="118" text-anchor="middle" dominant-baseline="central" fill="#3C3489">app.py — Streamlit UI</text>
<text font-family="sans-serif" font-size="12" x="340" y="138" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Session state · difficulty · render</text>

<!-- Arrow down -->
<line x1="340" y1="154" x2="340" y2="188" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="350" y="176" dominant-baseline="central" fill="#888">calls</text>

<!-- LOGIC_UTILS container -->
<rect x="40" y="188" width="600" height="136" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="210" text-anchor="middle" dominant-baseline="central" fill="#085041">logic_utils.py — core logic + logging</text>

<!-- Four inner boxes -->
<rect x="58" y="222" width="130" height="88" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="123" y="248" text-anchor="middle" dominant-baseline="central" fill="#3C3489">parse_guess()</text>
<text font-family="sans-serif" font-size="12" x="123" y="268" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Input guardrails</text>
<text font-family="sans-serif" font-size="12" x="123" y="284" text-anchor="middle" dominant-baseline="central" fill="#534AB7">range · type · empty</text>

<rect x="208" y="222" width="126" height="88" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="271" y="248" text-anchor="middle" dominant-baseline="central" fill="#3C3489">check_guess()</text>
<text font-family="sans-serif" font-size="12" x="271" y="268" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Win / Too High</text>
<text font-family="sans-serif" font-size="12" x="271" y="284" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Too Low</text>

<rect x="354" y="222" width="126" height="88" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="417" y="248" text-anchor="middle" dominant-baseline="central" fill="#3C3489">update_score()</text>
<text font-family="sans-serif" font-size="12" x="417" y="268" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Points + floor</text>
<text font-family="sans-serif" font-size="12" x="417" y="284" text-anchor="middle" dominant-baseline="central" fill="#534AB7">scoring logic</text>

<rect x="500" y="222" width="126" height="88" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="563" y="248" text-anchor="middle" dominant-baseline="central" fill="#3C3489">get_range()</text>
<text font-family="sans-serif" font-size="12" x="563" y="268" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Difficulty →</text>
<text font-family="sans-serif" font-size="12" x="563" y="284" text-anchor="middle" dominant-baseline="central" fill="#534AB7">range bounds</text>

<!-- Logging arrow to game.log -->
<line x1="640" y1="256" x2="640" y2="362" stroke="#888" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

<!-- GAME.LOG -->
<rect x="580" y="362" width="80" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="620" y="378" text-anchor="middle" dominant-baseline="central" fill="#633806">game.log</text>
<text font-family="sans-serif" font-size="12" x="620" y="396" text-anchor="middle" dominant-baseline="central" fill="#854F0B">audit trail</text>

<!-- Arrows down to tests -->
<line x1="200" y1="324" x2="200" y2="362" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="324" x2="340" y2="362" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- TESTS container -->
<rect x="40" y="362" width="520" height="56" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="300" y="382" text-anchor="middle" dominant-baseline="central" fill="#712B13">tests/</text>
<text font-family="sans-serif" font-size="12" x="300" y="400" text-anchor="middle" dominant-baseline="central" fill="#993C1D">test_game_logic.py (pytest · 10 cases)     test_suite.py (harness · 30 cases)</text>

<!-- Arrow to report -->
<line x1="300" y1="418" x2="300" y2="452" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- REPORT -->
<rect x="165" y="452" width="270" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="300" y="468" text-anchor="middle" dominant-baseline="central" fill="#27500A">Pass/fail report</text>
<text font-family="sans-serif" font-size="12" x="300" y="486" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">X/30 passed · colored terminal output</text>
</svg>
